{% extends "base.html" %}

{% block title %}Tags — DAM{% endblock %}

{% block content %}
<h1>Tags <span class="muted">({{ total_tags }})</span></h1>

{% if tags.is_empty() %}
<p class="muted">No tags yet.</p>
{% else %}
<table class="data-table">
    <thead>
        <tr>
            <th>Tag</th>
            <th style="text-align:right">Assets</th>
        </tr>
    </thead>
    <tbody>
        {% for t in tags %}
        <tr>
            <td><a href="/?tag={{ t.name }}">{{ t.name }}</a></td>
            <td style="text-align:right">{{ t.count }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endif %}
{% endblock %}
