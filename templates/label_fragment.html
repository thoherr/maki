<div class="label-picker">
    <span class="label-dot{% if color_label.as_deref() == Some("Red") %} active{% endif %}"
          style="background: #e74c3c;"
          hx-put="/api/asset/{{ asset_id }}/label"
          hx-target="#label"
          hx-swap="innerHTML"
          hx-vals='{"label": "{% if color_label.as_deref() == Some("Red") %}{% else %}Red{% endif %}"}'
          title="{% if color_label.as_deref() == Some("Red") %}Clear label{% else %}Red{% endif %}"></span>
