{% match primary_preview_url %}
{% when Some with (url) %}
<img src="{{ url }}" alt="Preview">
{% when None %}
<div class="no-preview">No preview available</div>
{% endmatch %}
<button class="preview-generate-btn"
        hx-post="/api/asset/{{ asset_id }}/preview"
        hx-target="#preview"
        hx-swap="innerHTML"
        hx-indicator="#preview-spinner">
    {% match primary_preview_url %}
    {% when Some with (_url) %}Regenerate preview{% when None %}Generate preview{% endmatch %}
</button>
<span id="preview-spinner" class="htmx-indicator">Generating...</span>
