name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
            ext: tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            ext: zip

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: release-${{ runner.os }}-cargo-

      # --- Standard build ---

      - name: Build release binary (standard)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package standard binary (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARCHIVE="maki-${VERSION}-${{ matrix.platform }}.${{ matrix.ext }}"
          mkdir -p staging
          cp target/${{ matrix.target }}/release/maki staging/
          cp README.md LICENSE staging/
          cd staging && tar czf "../${ARCHIVE}" *
          echo "STANDARD_ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Package standard binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          $ARCHIVE = "maki-${VERSION}-${{ matrix.platform }}.${{ matrix.ext }}"
          New-Item -ItemType Directory -Path staging -Force
          Copy-Item "target/${{ matrix.target }}/release/maki.exe" staging/
          Copy-Item README.md, LICENSE staging/
          Compress-Archive -Path staging/* -DestinationPath $ARCHIVE
          echo "STANDARD_ARCHIVE=${ARCHIVE}" >> $env:GITHUB_ENV

      # --- AI build ---

      - name: Build release binary (AI features)
        run: cargo build --release --target ${{ matrix.target }} --features ai

      - name: Package AI binary (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARCHIVE="maki-${VERSION}-${{ matrix.platform }}-ai.${{ matrix.ext }}"
          rm -rf staging
          mkdir -p staging
          cp target/${{ matrix.target }}/release/maki staging/
          cp README.md LICENSE staging/
          cd staging && tar czf "../${ARCHIVE}" *
          echo "AI_ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Package AI binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          $ARCHIVE = "maki-${VERSION}-${{ matrix.platform }}-ai.${{ matrix.ext }}"
          Remove-Item -Recurse -Force staging -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path staging -Force
          Copy-Item "target/${{ matrix.target }}/release/maki.exe" staging/
          Copy-Item README.md, LICENSE staging/
          Compress-Archive -Path staging/* -DestinationPath $ARCHIVE
          echo "AI_ARCHIVE=${ARCHIVE}" >> $env:GITHUB_ENV

      # --- Upload artifacts ---

      - name: Upload standard archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ env.STANDARD_ARCHIVE }}

      - name: Upload AI archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-ai
          path: ${{ env.AI_ARCHIVE }}

  # --- Create GitHub release with all artifacts ---

  release:
    needs: [build]
    runs-on: ubuntu-latest
    name: Create release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Extract the changelog section for this version
          sed -n "/^## v${VERSION}/,/^## v/p" CHANGELOG.md | head -n -1 | tail -n +2 > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > release-notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            artifacts/macos-arm64/*
            artifacts/macos-arm64-ai/*
            artifacts/linux-x86_64/*
            artifacts/linux-x86_64-ai/*
            artifacts/windows-x86_64/*
            artifacts/windows-x86_64-ai/*
            doc/manual/maki-manual.pdf
            doc/manual/cheat-sheet.pdf
