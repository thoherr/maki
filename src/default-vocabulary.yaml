# MAKI default AI vocabulary.
#
# Each key is a label the SigLIP model sees (so it must be a short,
# embedding-friendly noun phrase). Each value is the hierarchical
# MAKI tag (or list of tags) suggested when the model picks that
# label.
#
# This file is the source of truth for both: the labels list is
# derived from the keys at load time. There is no separate
# my-labels.txt.
#
# To override: copy this file to your catalog (or anywhere), edit
# freely, and point `[ai] labels = "path/to/your-vocab.yaml"` at
# it in `maki.toml`. The `.yaml` / `.yml` extension is what
# switches the loader into vocabulary mode. A plain `.txt` file
# still works for backward-compatible flat-label setups (in
# which case the suggested tag IS the label).
#
# Conventions used below — none of these are MAKI-enforced, just
# the tagging-guide's defaults so the out-of-the-box experience
# fits a coherent taxonomy:
#
#   subject|...     — what the photo IS of
#   event|...       — occasion / what's happening
#   lighting|...    — quality of light
#   technique|...   — artistic / processing style
#   composition|... — formal characteristics
#   season|...      — time of year
#   type|...        — non-photo formats
#
# To fan a single label into multiple tags, use a list value.
# To leave a label flat (no mapping applied), use null.
# To remove a label from the active vocabulary entirely, comment
# the line out.

